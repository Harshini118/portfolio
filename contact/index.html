<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Harshini Kanakala</title>

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<main>
    <h1>Contact Me</h1>

    <p>
        You can reach me at: 
        <a href="mailto:harshini.kanakala@gmail.com">
            harshini.kanakala@gmail.com
        </a>
    </p>

    <!-- ✅ FORM INSIDE MAIN -->
    <form action="mailto:harshini.kanakala@gmail.com" method="POST" enctype="text/plain">
        
        <label>
            Email:
            <input type="email" name="email" required>
        </label>

        <label>
            Subject:
            <input name="subject">
        </label>

        <label>
            Message:
            <textarea name="body"></textarea>
        </label>

        <button>Send</button>

    </form>
</main>

<!-- ✅ THIS IS THE IMPORTANT PART -->
<script type="module" src="../global.js"></script>

</body>
</html>
